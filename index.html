<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fresh Market TT</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #121212;
      color: #fff;
    }
    header {
      background-color: #1e1e1e;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      margin: 0;
      color: #00ff7f;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px;
      text-align: center;
    }
    .hero img {
      max-width: 300px;
      border-radius: 15px;
      margin-bottom: 20px;
    }
    .hero h2 {
      color: #ffd700;
      margin-bottom: 10px;
    }
    .hero p {
      font-size: 18px;
      margin-bottom: 20px;
    }
    .contact {
      background-color: #1e1e1e;
      padding: 20px;
      text-align: center;
    }
    .contact a {
      display: inline-block;
      margin: 5px 10px;
      padding: 10px 20px;
      background-color: #00ff7f;
      color: #000;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }
    footer {
      text-align: center;
      padding: 15px;
      font-size: 14px;
      background-color: #111;
    }
  </style>
</head>
<body>

  <header>
    <h1>Fresh Market TT</h1>
  </header>

  <section class="hero">
    <img src="https://i.imgur.com/7nFzF9F.png" alt="Black man in apron with fruits and vegetables">
    <h2>Fresh Fruits & Vegetables</h2>
    <p>Support local farmers and enjoy fresh produce daily!</p>
  </section>

  <section class="contact">
    <h3>Contact Us</h3>
    <p>📞 Phone: +1 (868) 789-0535</p>
    <a href="https://wa.me/18687890535" target="_blank">Chat on WhatsApp</a>
  </section>

  <footer>
    &copy; 2026 Fresh Market TT. All rights reserved.
  </footer>

</body>
</html>
